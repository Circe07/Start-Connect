openapi: 3.0.3
info:
  title: StartAndConnect API
  version: 0.1.0
servers:
  - url: /api
security:
  - bearerAuth: []
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Error:
      type: object
      properties:
        message:
          type: string
    Paginated:
      type: object
      properties:
        hasMore:
          type: boolean
        nextStartAfterId:
          type: string
          nullable: true
paths:
  /health:
    get:
      security: []
      summary: Healthcheck
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
  /auth/register:
    post:
      security: []
      summary: Register user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, name, username]
              properties:
                email: { type: string }
                password: { type: string }
                name: { type: string }
                username: { type: string }
      responses:
        "201": { description: Created }
        "400": { description: Validation error, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
        "500": { description: Internal error, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
  /auth/login:
    post:
      security: []
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string }
                password: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  token: { type: string }
                  refreshToken: { type: string }
                  uid: { type: string }
        "429": { description: Rate limited }
  /auth/refresh:
    post:
      security: []
      summary: Refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken: { type: string }
      responses:
        "200":
          description: OK
        "401":
          description: Invalid/expired refresh token
        "429":
          description: Rate limited
  /auth/logout:
    post:
      summary: Logout (revoke refresh tokens)
      responses:
        "200": { description: OK }
        "401": { description: Unauthorized }
  /activities:
    get:
      summary: List activities (Discover)
      parameters:
        - in: query
          name: city
          schema: { type: string }
        - in: query
          name: zone
          schema: { type: string }
        - in: query
          name: interests
          description: CSV interests (max 10)
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 50 }
        - in: query
          name: startAfterId
          schema: { type: string }
        - in: query
          name: lat
          schema: { type: number }
        - in: query
          name: lng
          schema: { type: number }
        - in: query
          name: radius
          description: meters
          schema: { type: number }
      responses:
        "200": { description: OK }
        "401": { description: Unauthorized }
  /swipes:
    post:
      summary: Record swipe (like/dislike)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [activityId, direction]
              properties:
                activityId: { type: string }
                direction: { type: string, enum: [like, dislike] }
      responses:
        "201": { description: Created }
        "400": { description: Validation error }
        "401": { description: Unauthorized }
        "404": { description: Activity not found }
  /matches:
    get:
      summary: List matches (MVP = likes)
      parameters:
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 50 }
        - in: query
          name: startAfterId
          schema: { type: string }
      responses:
        "200": { description: OK }
        "401": { description: Unauthorized }
  /groups/public:
    get:
      summary: Public groups (paginated)
      parameters:
        - in: query
          name: limit
          schema: { type: integer }
        - in: query
          name: startAfterId
          schema: { type: string }
      responses:
        "200": { description: OK }
        "401": { description: Unauthorized }
  /groups/{id}/join:
    post:
      summary: Join group
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK }
        "401": { description: Unauthorized }
        "404": { description: Not found }
        "409": { description: Conflict (already member / full) }
  /groups/{id}/messages:
    post:
      summary: Send group message
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content: { type: string }
      responses:
        "201": { description: Created }
        "401": { description: Unauthorized }
        "403": { description: Forbidden (not a member) }

