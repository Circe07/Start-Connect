openapi: 3.0.3
info:
  title: StartAndConnect API
  version: 0.1.0
servers:
  - url: /api
security:
  - bearerAuth: []
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Error:
      type: object
      properties:
        message:
          type: string
    Paginated:
      type: object
      properties:
        hasMore:
          type: boolean
        nextStartAfterId:
          type: string
          nullable: true
    ExperienceCreateRequest:
      type: object
      required: [titulo, deporte_vertical, ciudad, fecha, hora_inicio, hora_fin]
      properties:
        titulo: { type: string }
        descripcion: { type: string }
        deporte_vertical: { type: string }
        ciudad: { type: string }
        club: { type: string }
        direccion: { type: string }
        fecha: { type: string }
        hora_inicio: { type: string }
        hora_fin: { type: string }
        nivel_permitido: { type: string }
        plazas_totales: { type: integer, minimum: 1 }
        precio: { type: number }
        host_asignado: { type: string, nullable: true }
        center_id:
          type: string
          description: Centro/club registrado (opcional, pero si se envía debe existir en /centers)
    FeedbackCreateRequest:
      type: object
      required: [experience_id]
      properties:
        experience_id: { type: string }
        nota_1_10:
          type: integer
          minimum: 1
          maximum: 10
          description: Campo legacy (compatibilidad hacia atrás).
        nota_app:
          type: integer
          minimum: 1
          maximum: 10
        nota_club:
          type: integer
          minimum: 1
          maximum: 10
        nota_host:
          type: integer
          minimum: 1
          maximum: 10
        nota_companeros:
          type: integer
          minimum: 1
          maximum: 10
        repetiria: { type: boolean }
        traeria_amigo: { type: boolean }
        comentario: { type: string }
paths:
  /health:
    get:
      security: []
      summary: Healthcheck
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
  /auth/register:
    post:
      security: []
      summary: Register user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, name, username]
              properties:
                email: { type: string }
                password: { type: string }
                name: { type: string }
                username: { type: string }
      responses:
        '201': { description: Created }
        '400':
          {
            description: Validation error,
            content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } },
          }
        '500':
          {
            description: Internal error,
            content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } },
          }
  /auth/login:
    post:
      security: []
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string }
                password: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  token: { type: string }
                  refreshToken: { type: string }
                  uid: { type: string }
        '429': { description: Rate limited }
  /auth/refresh:
    post:
      security: []
      summary: Refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken: { type: string }
      responses:
        '200':
          description: OK
        '401':
          description: Invalid/expired refresh token
        '429':
          description: Rate limited
  /auth/logout:
    post:
      summary: Logout (revoke refresh tokens)
      responses:
        '200': { description: OK }
        '401': { description: Unauthorized }
  /activities:
    get:
      summary: List activities (Discover)
      parameters:
        - in: query
          name: city
          schema: { type: string }
        - in: query
          name: zone
          schema: { type: string }
        - in: query
          name: interests
          description: CSV interests (max 10)
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 50 }
        - in: query
          name: startAfterId
          schema: { type: string }
        - in: query
          name: lat
          schema: { type: number }
        - in: query
          name: lng
          schema: { type: number }
        - in: query
          name: radius
          description: meters
          schema: { type: number }
      responses:
        '200': { description: OK }
        '401': { description: Unauthorized }
  /swipes:
    post:
      summary: Record swipe (like/dislike)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [activityId, direction]
              properties:
                activityId: { type: string }
                direction: { type: string, enum: [like, dislike] }
      responses:
        '201': { description: Created }
        '400': { description: Validation error }
        '401': { description: Unauthorized }
        '404': { description: Activity not found }
  /matches:
    get:
      summary: List matches (MVP = likes)
      parameters:
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 50 }
        - in: query
          name: startAfterId
          schema: { type: string }
      responses:
        '200': { description: OK }
        '401': { description: Unauthorized }
  /groups/public:
    get:
      summary: Public groups (paginated)
      parameters:
        - in: query
          name: limit
          schema: { type: integer }
        - in: query
          name: startAfterId
          schema: { type: string }
      responses:
        '200': { description: OK }
        '401': { description: Unauthorized }
  /groups/{id}/join:
    post:
      summary: Join group
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200': { description: OK }
        '401': { description: Unauthorized }
        '404': { description: Not found }
        '409': { description: Conflict (already member / full) }
  /groups/{id}/messages:
    post:
      summary: Send group message
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content: { type: string }
      responses:
        '201': { description: Created }
        '401': { description: Unauthorized }
        '403': { description: Forbidden (not a member) }
  /experiences:
    get:
      summary: List experiences
      parameters:
        - in: query
          name: estado
          schema: { type: string }
        - in: query
          name: center_id
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100 }
      responses:
        '200': { description: OK }
        '401': { description: Unauthorized }
    post:
      summary: Create experience (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExperienceCreateRequest'
      responses:
        '201': { description: Created }
        '400': { description: Validation error or center_id does not exist }
        '401': { description: Unauthorized }
        '403': { description: Forbidden }
  /feedback:
    post:
      summary: Create feedback (legacy or v2 granular)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FeedbackCreateRequest'
      responses:
        '201': { description: Created }
        '400': { description: Validation error }
        '401': { description: Unauthorized }
        '409': { description: Duplicate feedback for same user + experience }
  /payments/checkout:
    post:
      summary: Create checkout URL for a booking (fixed or dynamic Stripe mode)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [booking_id]
              properties:
                booking_id: { type: string }
      responses:
        '200': { description: Checkout URL generated }
        '400': { description: Validation error }
        '401': { description: Unauthorized }
        '403': { description: Forbidden }
        '404': { description: Booking not found }
        '409': { description: Booking already paid }
  /payments/{bookingId}/status:
    get:
      summary: Read payment status by booking id
      parameters:
        - in: path
          name: bookingId
          required: true
          schema: { type: string }
      responses:
        '200': { description: Payment status }
        '401': { description: Unauthorized }
        '403': { description: Forbidden }
        '404': { description: Booking not found }
  /payments/webhook:
    post:
      security: []
      summary: Stripe webhook receiver
      responses:
        '200': { description: Event processed }
        '400': { description: Invalid signature or malformed event }
